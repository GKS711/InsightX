  </g>

  <g fill="none" stroke="#A5A0FF" stroke-width="1.4" stroke-linecap="round" opacity="0.7">
    <path d="M302 130v18"/>
    <path d="M293 139h18"/>
    <path d="M690 150v14"/>
    <path d="M683 157h14"/>
    <circle cx="318" cy="312" r="3" fill="#A5A0FF" stroke="none"/>
    <circle cx="517" cy="128" r="4" fill="#635BFF" stroke="none" opacity="0.75"/>
  </g>
</svg>
