<!-- v4 bridge：把 ES module 的 core/ + hooks/ 掛到 window.IX，供下方 Babel 區塊消費 -->
<script type="module" src="/bootstrap.js"></script>

<script type="text/babel" data-presets="react">

// ========================================================
// IX bridge — 從 window.IX 取出 reducer + adapters + helpers
// ========================================================
const IX_LIB = window.IX;
if (!IX_LIB) {
  console.error("[InsightX] window.IX not ready — bootstrap.js must load before this Babel block");
}
const { useAppReducer, useAnalyzeStream, Adapters, Async, formatErrorMessage } = IX_LIB || {};
// P3.9-7：fallback 給單獨開檔測試 / IX 還沒 ready 時用，行為跟 core/async.js 同。
const _fmtErr = formatErrorMessage || ((e, fb = "未知錯誤") =>
  e == null ? fb : (typeof e === "string" ? e : (typeof e === "object" && typeof e.message === "string" && e.message ? e.message : fb))
);

// Context for slice-aware components
const IXContext = React.createContext(null);
const useIX = () => React.useContext(IXContext);

// ========================================================
// Helpers — 把後端 SSE / POST 結構轉成元件需要的 view-model
// ========================================================

// SSE result 包裝為 {platform, effective_yt_role, durationMs, data}；POST 直接是 data
const unwrapAnalyze = (raw) => {
  if (!raw) return null;
  if (raw.data && typeof raw.data === "object" && (raw.data.store_name || raw.data.good || raw.data.summary)) {
    return raw.data;
  }
  return raw;
};

// P3.12-R3：DISPLAY_REVIEWS_LIMIT 撤掉（原本 50）。理由：buildReviews 在這層 slice 會
// 讓 ReviewsSection 永遠看到 reviews.length <= 50 → truncated 永遠 false → 「精選 N」字樣
// 跟「下方顯示其中 50 則樣本」caption 永遠出不來，使用者就看不到 honest 的「我分析了 N 則」。
// 顯示限制統一交給 ReviewsSection 的 MAX_REVIEWS_DISPLAY 處理。
// 其他用到 buildReviews 的地方（如 buildSentiment）本來就是用 raw.reviews_structured 直接算，
// 不受影響。React render 也只 render 前 50 則（slice 在 ReviewsSection），性能無慮。

const parseCountNumber = (value) => {
  if (typeof value === "number" && Number.isFinite(value)) return Math.max(0, Math.round(value));
  if (typeof value !== "string") return null;
  const trimmed = value.trim();
  if (!/^\d[\d,]*$/.test(trimmed)) return null;
  return Number(trimmed.replace(/,/g, ""));
};

// 把後端 analyze 結果映射到 dashboard 用的 view-model（保留 mock fallback shape）
const buildShopViewModel = (rawIn) => {
  const raw = unwrapAnalyze(rawIn) || {};
  const totalReviews = parseCountNumber(raw.total_reviews) ?? parseCountNumber(raw.rating_count);
  const analyzedCount = (typeof raw.review_count === "number" && raw.review_count > 0)
    ? raw.review_count
    : (Array.isArray(raw.reviews_structured) ? raw.reviews_structured.length : null);
  return {
    name: raw.store_name || RESTAURANT.name,
    nameZh: raw.store_name || RESTAURANT.nameZh,
    address: raw.address || RESTAURANT.address,
    city: RESTAURANT.city,
    category: raw.category || RESTAURANT.category,
    platform: raw.platform || "google",
    googleUrl: RESTAURANT.googleUrl,
    rating: raw.rating != null ? raw.rating : RESTAURANT.rating,
    ratingPrev: RESTAURANT.ratingPrev,
    reviewCount: totalReviews ?? RESTAURANT.reviewCount,
    totalReviews,
    reviewCountNew: raw.reviews_analyzed || RESTAURANT.reviewCountNew,
    // 純數字，前端 Hero 顯示用（後端帶 review_count；fallback 用 reviews_structured.length）
    analyzedCount,
    hours: RESTAURANT.hours,
    phone: RESTAURANT.phone,
    analyzedAt: raw.analyzed_at || "",
    reportId: raw.report_id || RESTAURANT.reportId,
    _raw: raw,
  };
};

// 從 raw analyze 推 sentiment %
//   1) 後端有給 raw.sentiment 物件 → 直接用
//   2) 否則從 reviews_structured 的 rating 分布推：>=4 正向、==3 中性、<=2 負面
//   3) 都沒有才 fallback 到 SENTIMENT mock
const buildSentiment = (rawIn) => {
  const raw = unwrapAnalyze(rawIn) || {};
  if (raw.sentiment && typeof raw.sentiment === "object") {
    const s = raw.sentiment;
    if (s.positive != null && s.negative != null) {
      return {
        positive: Math.round(s.positive),
        neutral: Math.round(s.neutral != null ? s.neutral : Math.max(0, 100 - s.positive - s.negative)),
        negative: Math.round(s.negative),
      };
    }
  }
  // 從真實評論 rating 算
  const reviews = Array.isArray(raw.reviews_structured) ? raw.reviews_structured : [];
  if (reviews.length > 0) {
    let pos = 0, neu = 0, neg = 0;
    for (const r of reviews) {
      const rating = typeof r.rating === "number" ? r.rating : Number(r.rating);
      if (!Number.isFinite(rating)) continue;
      if (rating >= 4) pos++;
      else if (rating === 3) neu++;
      else if (rating <= 2 && rating > 0) neg++;
    }
    const total = pos + neu + neg;
    if (total > 0) {
      const pPct = Math.round((pos * 100) / total);
      const nPct = Math.round((neg * 100) / total);
      const uPct = Math.max(0, 100 - pPct - nPct); // 用減法避免三項加總 ≠ 100
      return { positive: pPct, neutral: uPct, negative: nPct };
    }
  }
  return SENTIMENT;
};

// 從 raw analyze 推 themes（good/bad list）成 THEMES_POS / THEMES_NEG shape
// 只用 LLM 真實回的 label + value（提及比例%），不再偽造 count / pct / sample。
// 後端 LLM prompt（src/services/llm_service.py 第 87-96 / 114-123 行）僅保證回 {label, value}，
// 因此 sample/count 一律給 null，由 ThemesSection 自行決定顯不顯示。
const buildThemes = (rawIn) => {
  const raw = unwrapAnalyze(rawIn) || {};
  // P3.9-5R fix #4：label 缺值不再灌「主題 N」placeholder。
  // 沒 label 的條目直接過濾，避免 strict facts 被偽造主題汙染。
  const pickLabel = (x) => {
    const lab = x.theme || x.title || x.label || "";
    return typeof lab === "string" && lab.trim() ? lab.trim() : null;
  };
  // P3.9-5R-R3 fix #4：Array.isArray 防禦，避免 LLM schema 變動時 .slice 炸掉。
  const goodArr = Array.isArray(raw.good) ? raw.good : [];
  const badArr = Array.isArray(raw.bad) ? raw.bad : [];
  const pos = goodArr.slice(0, 5).map((g) => {
    const label = pickLabel(g);
    if (!label) return null;
    const v = typeof g.value === "number" ? g.value : null;
    return {
      label,
      pct: v != null ? Math.max(0, Math.min(100, Math.round(v))) : null,
      sample: g.quote || g.sample || g.example || g.evidence || "",
    };
  }).filter(Boolean);
  const neg = badArr.slice(0, 5).map((b) => {
    const label = pickLabel(b);
    if (!label) return null;
    const v = typeof b.value === "number" ? b.value : null;
    return {
      label,
      pct: v != null ? Math.max(0, Math.min(100, Math.round(v))) : null,
      // 不再用排名假裝 severity；後端 LLM 沒給 severity 欄位 (P3.9 移除)
      sample: b.quote || b.sample || b.example || b.evidence || "",
    };
  }).filter(Boolean);
  return {
    pos: pos.length ? pos : THEMES_POS,
    neg: neg.length ? neg : THEMES_NEG,
  };
};

// 從 raw analyze 推 reviews（real reviews_structured）
// P3.15：分平台處理
//   - Google：r.rating 是 1-5 星，cap 到 [1,5]，從 rating 推 sentiment
//   - YouTube：r.rating 是 comment.like_count（譬如 12 個讚），**完全不是星等**。
//     ReviewCard 不能畫 StarRow（之前把 12 cap 成 5 顆星完全是胡謅）；sentiment 也不能
//     從 like_count 推（讚多不代表情感正向，可能是「炎上」討論串）→ 標 "unknown"
//     等 LLM 後續給標籤；同時把 likes 帶出來給 ReviewCard 顯示「♥ 12」。
const buildReviews = (rawIn) => {
  const raw = unwrapAnalyze(rawIn) || {};
  const list = raw.reviews_structured || raw.reviews || [];
  if (!list.length) return REVIEWS;
  const platform = raw.platform || "google";
  const isYT = platform === "youtube";
  return list.map((r) => {
    const name = r.author || r.name || "匿名";
    const ratingRaw = r.rating;
    const ratingNum = ratingRaw == null ? NaN : Number(ratingRaw);
    let rating = null;
    let likes = null;
    let sentiment = "unknown";
    if (isYT) {
      // YouTube：rating 欄位是 like_count（整數，可能 0~數萬）
      likes = Number.isFinite(ratingNum) && ratingNum > 0 ? ratingNum : null;
      // rating 留 null → ReviewCard 走 comment 模式不畫星
      // sentiment 留 unknown（暫不用 like_count 推；炎上影片高 like 的負評會被誤標 pos）
    } else {
      // Google：rating 是 1-5 星
      // P3.9-5R fix #5：後端可能用字串 "5" 回；用 Number() 強制轉。
      // P3.9-5R-R3 fix #5：cap 到 [1,5]，避免後端回 6/7 或負值汙染 sentiment 推斷。
      rating = (Number.isFinite(ratingNum) && ratingNum > 0) ? Math.min(5, ratingNum) : null;
      sentiment = rating == null
        ? "unknown"
        : rating >= 4 ? "pos" : rating <= 2 ? "neg" : "mixed";
    }
    return {
      name,
      init: name.slice(0, 1),
      rating,
      likes,
      kind: isYT ? "comment" : "review",
      when: r.when || r.relative_date || r.date || "",
      text: r.text || r.snippet || r.content || "",
      themes: r.themes || r.tags || [],
      sentiment,
    };
  });
};

const Sparkline = ({ data, w = 240, h = 50, tone = "ink" }) => {
  if (!data || data.length < 2) return null;
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const step = w / (data.length - 1);
  const pts = data.map((v, i) => [i * step, h - ((v - min) / range) * h * 0.9 - h * 0.05]);
  const d = pts.map((p, i) => `${i === 0 ? "M" : "L"}${p[0].toFixed(1)},${p[1].toFixed(1)}`).join(" ");
  const fillD = `${d} L${w},${h} L0,${h} Z`;
  const color = tone === "coral" ? "var(--coral)" : "var(--forest)";
  return (
    <svg width={w} height={h} style={{ display: "block", overflow: "visible" }}>
      <path d={fillD} fill={color} opacity="0.08" />
      <path d={d} stroke={color} strokeWidth="1.5" fill="none" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="3" fill={color}/>
      <circle cx={pts[pts.length-1][0]} cy={pts[pts.length-1][1]} r="5" fill={color} opacity="0.2"/>
    </svg>
  );
};

const Donut = ({ pos, neu, neg, size = 140 }) => {
  const r = size / 2 - 10, c = 2 * Math.PI * r;
  const total = (pos || 0) + (neu || 0) + (neg || 0) || 1;
  const posLen = ((pos || 0) / total) * c;
  const neuLen = ((neu || 0) / total) * c;
  const negLen = ((neg || 0) / total) * c;
  return (
    <svg width={size} height={size} style={{ transform: "rotate(-90deg)" }}>
      <circle cx={size/2} cy={size/2} r={r} stroke="var(--paper-3)" strokeWidth="1" fill="none"/>
      <circle cx={size/2} cy={size/2} r={r} stroke="var(--pos)" strokeWidth="14" fill="none"
              strokeDasharray={`${posLen} ${c}`} strokeDashoffset="0"/>
      <circle cx={size/2} cy={size/2} r={r} stroke="var(--ochre)" strokeWidth="14" fill="none"
              strokeDasharray={`${neuLen} ${c}`} strokeDashoffset={-posLen}/>
      <circle cx={size/2} cy={size/2} r={r} stroke="var(--neg)" strokeWidth="14" fill="none"
              strokeDasharray={`${negLen} ${c}`} strokeDashoffset={-(posLen + neuLen)}/>
    </svg>
  );
};

const useMouse = () => {
  const [m, setM] = React.useState({ x: 0.5, y: 0.5 });
  React.useEffect(() => {
    const h = (e) => setM({ x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight });
    window.addEventListener("mousemove", h);
    return () => window.removeEventListener("mousemove", h);
  }, []);
  return m;
};

const useScroll = () => {
  const [y, setY] = React.useState(0);
  React.useEffect(() => {
    const h = () => setY(window.scrollY);
    window.addEventListener("scroll", h, { passive: true });
    return () => window.removeEventListener("scroll", h);
  }, []);
  return y;
};

      </line>

    <svg {...common} viewBox="0 0 64 64">

      <circle cx="22" cy="22" r="7"/>

      <path d="M36 34 L50 34"/>

      <path d="M50 46 L34 46"/>

      <path d="M27 26 L34 33"/>
      <circle cx="34" cy="33" r="1.8" fill="var(--ink)" stroke="none"/>

  );
  if (kind === "action") return (

const LandingPage = ({ onComplete }) => {
  const ix = useIX();
  const state = ix?.state;
  const dispatch = ix?.dispatch;
  const Adapters = ix?.lib?.Adapters;

  const [mode, setMode] = React.useState(() => state?.mode?.currentPlatform || null);
  const [googleUrl, setGoogleUrl] = React.useState(() => state?.input?.googleUrl || "");
  const [youtubeUrl, setYoutubeUrl] = React.useState(() => state?.input?.youtubeUrl || "");
  const [ytRole, setYtRole] = React.useState(() => state?.mode?.ytRoleSelection || "creator");
  const my = useMouse();
  const sy = useScroll();
  const controllerRef = React.useRef(null);

  const url = mode === "youtube" ? youtubeUrl : googleUrl;
  const setUrl = mode === "youtube" ? setYoutubeUrl : setGoogleUrl;
  const STEPS = mode === "youtube" ? STEPS_YOUTUBE : STEPS_GOOGLE;

  // progress step derived from stream phase — rough UI pacing
  const phase = state?.stream?.phase || "idle";
  const isAnalyzing = phase === "connecting" || phase === "streaming";
  const isSucceeded = phase === "succeeded";
  const isFailed = phase === "failed";
  const streamError = state?.stream?.error;

  const [fakeStep, setFakeStep] = React.useState(0);
  React.useEffect(() => {
    if (!isAnalyzing) { setFakeStep(0); return; }
    setFakeStep(0);
    const t = setInterval(() => {
      setFakeStep(s => Math.min(s + 1, STEPS.length - 1));
    }, 900);
    return () => clearInterval(t);
  }, [isAnalyzing, STEPS.length]);

  // When result arrives, route to dashboard.
  // P3.13 fix：原本只看 isSucceeded === true 就跳，但使用者從 dashboard 點 logo 回
  // landing 時，stream.phase 還是 "succeeded"（上次留下的），LandingPage mount 一渲染
  // useEffect 立刻把使用者彈回 dashboard，無法停在首頁。
  // 改成只監聽 isSucceeded 從 false → true 的「轉換瞬間」才跳，現況是 true（不論之前
  // 是什麼）不觸發。
  const prevSucceededRef = React.useRef(isSucceeded);
  React.useEffect(() => {
    const wasNotSucceeded = !prevSucceededRef.current;
    prevSucceededRef.current = isSucceeded;
    if (wasNotSucceeded && isSucceeded && state?.features?.analyze?.data) {
      const t = setTimeout(() => onComplete && onComplete(), 500);
      return () => clearTimeout(t);
    }
  }, [isSucceeded, state?.features?.analyze?.data]);

  React.useEffect(() => () => {
    if (controllerRef.current?.close) controllerRef.current.close();
  }, []);

  const start = () => {
    if (!Adapters || !dispatch) return;
    const trimmed = (url || "").trim();
    if (trimmed.length < 8 || !mode) return;
    // persist mode + url
    dispatch({ type: "SWITCH_PLATFORM", platform: mode });
    dispatch({ type: "INPUT_CHANGE", platform: mode, value: trimmed });
    if (mode === "youtube") {
      dispatch({ type: "SWITCH_YT_ROLE", ytRole });
    }
    // close previous stream if any
    if (controllerRef.current?.close) controllerRef.current.close();
    controllerRef.current = Adapters.runAnalyzeStream({
      url: trimmed,
      platform: mode,
      ytRole: mode === "youtube" ? ytRole : undefined,
      dispatch,
    });
  };

  const scrollTop = () => window.scrollTo({ top: 0, behavior: "smooth" });

  return (
    <div style={{ background: "var(--paper)", color: "var(--ink)", position: "relative", overflow: "hidden" }}>
      <div style={{
        position: "fixed", zIndex: 0, pointerEvents: "none",

        top: `calc(${my.y * 100}% - 300px)`,
        background: "radial-gradient(circle, oklch(0.72 0.12 85 / 0.08) 0%, transparent 60%)",
        transition: "left .4s ease-out, top .4s ease-out",
        filter: "blur(30px)"
      }}/>
      <header style={{
        display: "flex", alignItems: "center", justifyContent: "space-between",
        padding: "20px 32px", position: "sticky", top: 0,
        background: sy > 40 ? "oklch(0.975 0.006 85 / 0.85)" : "var(--paper)",
        backdropFilter: sy > 40 ? "blur(12px)" : "none",
        zIndex: 10,
        borderBottom: sy > 40 ? "1px solid var(--rule)" : "1px solid transparent",
        transition: "background .3s, border-color .3s"
      }}>
        <Logo size={26}/>
        <nav style={{ display: "flex", alignItems: "center", gap: 28 }} className="hide-sm">
          <a onClick={() => document.getElementById("flow")?.scrollIntoView({ behavior: "smooth" })} style={navLink}>流程</a>
          <a onClick={() => document.getElementById("benefits")?.scrollIntoView({ behavior: "smooth" })} style={navLink}>特色</a>
          <a onClick={() => document.getElementById("report")?.scrollIntoView({ behavior: "smooth" })} style={navLink}>範例</a>
          <a onClick={() => document.getElementById("faq")?.scrollIntoView({ behavior: "smooth" })} style={navLink}>FAQ</a>
        </nav>
        <div className="mono tracking-wide" style={{ fontSize: 10, color: "var(--ink-3)", textTransform: "uppercase" }}>

            gap: 64, alignItems: "center"

  return n.toLocaleString();

function buildDashboardVM(analyzeData) {
  const raw = unwrapAnalyze(analyzeData);
  if (!raw) return { isMock: true, restaurant: RESTAURANT, sentiment: SENTIMENT,
    themesPos: THEMES_POS, themesNeg: THEMES_NEG, trend: TREND_90, reviews: REVIEWS };

  const shop = buildShopViewModel(raw);
  const sentiment = buildSentiment(raw) || SENTIMENT;
  const themes = buildThemes(raw);
  const reviews = buildReviews(raw);

// ============================================================================
// 兩層 VM 架構（Codex 審計建議）
//
// 原則：Dashboard 視覺可以 fallback mock；Toolkit / feature endpoints 絕對不能。
// 否則「真分析模式下顯示／傳給 LLM 餐廳罐頭」是長期 bug 源頭。
//
//   useDashboardDisplayVM() — Dashboard 用，缺欄補 mock（顯示視覺占位）
//   useAnalyzeFactsVM()    — Toolkit/feature 用，只回真資料；缺欄 = null/[]
// ============================================================================

// Dashboard display VM（保留 mock fallback；只用於視覺顯示）
const useDashboardDisplayVM = () => {
  const ix = useIX();
  const analyze = ix?.state?.features?.analyze;
  return React.useMemo(
    () => buildDashboardVM(analyze?.status === "ready" ? analyze.data : null),
    [analyze?.status, analyze?.requestId]
  );
};

// Strict facts VM — 給 Toolkit 與 feature endpoints 用。
// 沒真資料就回 isReady:false / 空陣列，不補 mock。
//
// P3.9-5R（Codex round 2）：必須同時擋兩種 mock 來源
//   (a) 後端 LLM 失敗時 routes.py 回 mock_fallback + _fallback=true（200 OK，會走進這裡）
//   (b) 前端 buildThemes/buildReviews 在沒 LLM 回值時 fallback 到 THEMES_POS/THEMES_NEG/REVIEWS 常數
// 所以判斷雙重防線：先看 raw._fallback，再看 reference equality。
function buildAnalyzeFacts(rawIn, requestId) {
  const empty = {
    isReady: false,
    analyzeRequestId: null,
    shop: null,
    themesPos: [],
    themesNeg: [],
    reviews: [],
    sentiment: null,
  };
  if (!rawIn) return empty;
  // P3.9-5R-R3 fix #1：unwrapAnalyze 會把 SSE 包裝層 {_fallback, data:{...}} 的 _fallback 吃掉，
  // 所以要在 unwrap 之前先檢查 top-level _fallback，再檢查 unwrap 後的。
  if (rawIn._fallback === true) {
    return { ...empty, analyzeRequestId: requestId || null };
  }
  const raw = unwrapAnalyze(rawIn);
  if (!raw) return empty;
  if (raw._fallback === true) {
    return { ...empty, analyzeRequestId: requestId || null };
  }
  const shop = buildShopViewModel(raw);
  const themes = buildThemes(raw);
  const reviews = buildReviews(raw);
  // buildThemes 在沒 LLM 回值時也會 fallback THEMES_POS/THEMES_NEG（display 用）。
  // 這裡用「結果是不是 mock 常數本身」的 reference 判斷。
  const realPos = themes?.pos && themes.pos !== THEMES_POS ? themes.pos : [];
  const realNeg = themes?.neg && themes.neg !== THEMES_NEG ? themes.neg : [];
  const realReviews = reviews && reviews !== REVIEWS ? reviews : [];
  // P3.9-5R-R3 fix #6：sentiment 在沒 reviews 時 buildSentiment 會回 SENTIMENT mock 常數，
  // strict VM 不能洩漏假數字 → 用 reference equality 過濾掉。
  const rawSentiment = buildSentiment(raw);
  const realSentiment = (rawSentiment && rawSentiment !== SENTIMENT) ? rawSentiment : null;
  return {
    isReady: true,
    analyzeRequestId: requestId || null,
    shop,
    themesPos: realPos,
    themesNeg: realNeg,
    reviews: realReviews,
    sentiment: realSentiment,
  };
}

const useAnalyzeFactsVM = () => {
  const ix = useIX();
  const analyze = ix?.state?.features?.analyze;
  return React.useMemo(
    () => buildAnalyzeFacts(
      analyze?.status === "ready" ? analyze.data : null,
      analyze?.requestId
    ),
    [analyze?.status, analyze?.requestId]
  );
};

function normalizeSwotFromApi(swot) {
  if (!swot) return null;
  const toItems = (arr) =>
    (arr || []).map((x, i) => {
      if (!x) return null;
      if (typeof x === "string") return { title: x.slice(0, 20), body: x };
      return {
        title: x.title || x.point || x.header || `項目 ${i + 1}`,
        body: x.body || x.detail || x.description || x.evidence || ""
      };
    }).filter(Boolean);
  return {
    strengths: toItems(swot.strengths),
    weaknesses: toItems(swot.weaknesses),
    opportunities: toItems(swot.opportunities),
    threats: toItems(swot.threats),
  };
}

const SwotSection = () => {
  const ix = useIX();
  const state = ix?.state;
  const dispatch = ix?.dispatch;
  const Adapters = ix?.lib?.Adapters;
  const analyze = state?.features?.analyze;
  const swotSlice = state?.features?.swot;
  const platform = state?.stream?.platform || state?.mode?.currentPlatform || "google";
  // P3.16 R3（⚙ Codex debug SWOT 失敗時指出）：adapter 支援 yt_role 但 caller 沒傳 →
  // contract completeness 補上。目前 llm.generate_swot 還沒用到 yt_role，但補齊讓未來
  // YouTube creator/shop/brand 分支 prompt 有機會吃到正確 role。
  const ytRole = state?.stream?.ytRole || state?.mode?.ytRoleSelection || null;

  const analyzeRunId = analyze?.requestId;
  const haveData = analyze?.status === "ready" && analyze?.data;

  React.useEffect(() => {
    if (!haveData || !dispatch || !Adapters) return;
    if (swotSlice?.status === "loading" || swotSlice?.status === "ready") return;
    const raw = unwrapAnalyze(analyze.data);
    const good = raw?.good || raw?.strengths || [];
    const bad = raw?.bad || raw?.weaknesses || [];
    Adapters.fetchSwot({
      good, bad, platform, ytRole,
      dispatch,
    }).catch(() => {});
    // eslint-disable-next-line
  }, [haveData, analyzeRunId]);

  const apiSwot = normalizeSwotFromApi(swotSlice?.data?.swot || swotSlice?.data);
  // P3.9-5R-R3 fix #8：真分析就緒時，SWOT 沒回來不再 fallback SWOT mock。
  // - 主分析未就緒（落地頁 / demo 預覽）→ 仍可用 SWOT mock 做版面 baseline
  // - 主分析已就緒但 SWOT 還在 loading / failed → 顯示空態，避免假四象限被當真話用
  const loading = swotSlice?.status === "loading";
  const swotFailed = swotSlice?.status === "failed";
  const useMockBaseline = !haveData;
  const swot = apiSwot || (useMockBaseline ? SWOT : null);

  return (
    <Section num="03" kicker="SWOT / Strategic posture" title="你站在哪裡，你能去哪裡。">
      {loading && (
        <div style={{ marginBottom: 12, fontSize: 12, color: "var(--ink-3)" }} className="mono">
          · SWOT 分析中…
        </div>
      )}
      {swot ? (
        <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 0, border: "1px solid var(--ink)" }} className="swot-grid">
          <SwotCell label="Strengths / 優勢" items={swot.strengths} tone="forest" num="S" borderR borderB/>
          <SwotCell label="Weaknesses / 劣勢" items={swot.weaknesses} tone="coral" num="W" borderB/>
          <SwotCell label="Opportunities / 機會" items={swot.opportunities} tone="ochre" num="O" borderR/>
          <SwotCell label="Threats / 威脅" items={swot.threats} tone="slate" num="T"/>
        </div>
      ) : (
        <div style={{ border: "1px dashed var(--rule)", padding: "44px 32px", textAlign: "center", background: "var(--paper-2)" }}>
          <Stamp tone={swotFailed ? "coral" : undefined}>{swotFailed ? "AI 暫時無法生成 SWOT" : "SWOT 撰寫中"}</Stamp>
          <p style={{ fontSize: 13, color: "var(--ink-3)", margin: "12px 0 0", lineHeight: 1.6 }}>

// P3.12-R2（2026-04-23 使用者澄清）：後端不 cap，照抓所有 Serper 給的含文字評論並全部
// 餵給 LLM。UI §04 只是「呈現面」要限制 — 否則上千則會炸畫面。
//   - 篩選按鈕「全部」改成「精選」（讓店家知道這不是真正的全部，避免「分析不完整」誤解）
//   - 篩選按鈕的 count 顯示「畫面顯示的數」（min(reviews.length, 50)）
//   - 各 sentiment count 也用「畫面顯示這 50 則的分布」（顯示什麼就統計什麼，避免按下去看到的數和按鈕數不對）
//   - caption 加一段說明：當 reviews.length > MAX 時告訴店家「實際分析了 N 則，下方顯示其中 50 則樣本」
//                      reviews.length <= MAX 時只顯示「分析了 N 則」
//   - 抓所有評論的 honest scope：「Google Maps 共 M 則評分」依然顯示（M > N 時）
const MAX_REVIEWS_DISPLAY = 50;
const ReviewsSection = ({ vm }) => {
  const [filter, setFilter] = React.useState("all");
  const reviews = vm.reviews || [];
  // 先 slice 顯示上限（保留前端餵給使用者的「樣本」），避免上千則炸畫面
  const displayed = reviews.slice(0, MAX_REVIEWS_DISPLAY);
  const filtered = displayed.filter(r => filter === "all" || r.sentiment === filter);
  const totalReviews = vm.restaurant?.totalReviews;
  const platform = vm.platform || "google";
  const truncated = reviews.length > MAX_REVIEWS_DISPLAY;
  // 第一句：「實際分析了 N 則」 — 讓店家知道 LLM 看了多少
  const analyzedLabel = platform === "youtube"
    ? `本次分析了 ${reviews.length} 則影片留言`
    : `本次分析了 ${reviews.length} 則含文字評論`;
  // 第二句：truncated 時補「下方顯示其中 50 則樣本」 — 解釋為什麼按鈕數小於分析數
  const sampleHint = truncated
    ? `下方顯示其中精選的 ${MAX_REVIEWS_DISPLAY} 則樣本`
    : "";
  // 第三句（店家獨有）：補 Google Maps 公布的總則數，讓店家對齊認知
  const sourceHint = platform === "google" && typeof totalReviews === "number" && totalReviews > reviews.length
    ? `Google Maps 共 ${formatRatingCount(totalReviews)} 則評分（含未寫文字者）`
    : "";
  const captionParts = [analyzedLabel, sampleHint, sourceHint].filter(Boolean);
  return (
    <Section num="04" kicker="Original material" title="這是他們原本說的話。">
      <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
        {/* P3.15：YouTube 留言目前 sentiment 全是 "unknown"（buildReviews 不從 like_count 推），
             顯示「正向 0 / 負面 0 / 混合 0」會很怪。等 LLM 給標籤前，YouTube 只顯示一顆「全部 / 精選」按鈕。 */}
        {(platform === "youtube"
          ? [["all", truncated ? "精選" : "全部", displayed.length]]
          : [
              ["all", truncated ? "精選" : "全部", displayed.length],
              ["pos","正向",displayed.filter(r=>r.sentiment==="pos").length],
              ["neg","負面",displayed.filter(r=>r.sentiment==="neg").length],
              ["mixed","混合",displayed.filter(r=>r.sentiment==="mixed").length],
            ]
         ).map(([k, l, n]) => (
          <button key={k} onClick={() => setFilter(k)}
            style={{
              padding: "6px 14px", fontSize: 12, fontWeight: 500,
              background: filter === k ? "var(--ink)" : "transparent",
              color: filter === k ? "var(--paper)" : "var(--ink-2)",
              border: `1px solid ${filter === k ? "var(--ink)" : "var(--rule)"}`,
              cursor: "pointer", fontFamily: "var(--sans)"
            }}>
            {l} <span className="mono" style={{ opacity: 0.6, marginLeft: 6 }}>{n}</span>
          </button>
        ))}
      </div>
      <div style={{ marginBottom: 24, fontSize: 12, lineHeight: 1.6, color: "var(--ink-3)" }}>
        {captionParts.join(" · ")}
      </div>
      <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(320px, 1fr))", gap: 0,
        border: "1px solid var(--rule)" }}>
        {filtered.map((r, i) => (
          <ReviewCard key={i} review={r}/>
        ))}
      </div>
    </Section>
  );
};

// Copy button with feedback
const CopyBtn = ({ text, size = "sm" }) => {
  const [copied, setCopied] = React.useState(false);

    setCopied(true);

  };
  return (
    <Btn tone={copied ? "forest" : "ghost"} size={size} onClick={fire}>

    </Btn>

};

// Helper：strict 取 strengths / weaknesses；不存在就空陣列
//   1) SWOT slice ready → 用真 LLM 結果
//   2) 否則但 facts 已就緒 → 用 facts.themesPos.label / themesNeg.label 當代理
//   3) 都沒有 → 空陣列；上層 useEffect 看到空就早退，不發 fetch
const useSwotSummary = () => {
  const ix = useIX();
  const facts = useAnalyzeFactsVM();
  const swotSlice = ix?.state?.features?.swot;
  const data = swotSlice?.status === "ready" ? swotSlice.data : null;
  const norm = (arr) => (arr || []).map(it => {
    if (typeof it === "string") return it;
    if (it?.title) return it.title;
    if (it?.point) return it.point;
    return null;
  }).filter(Boolean);
  if (data?.strengths?.length || data?.weaknesses?.length) {
    return {
      strengths: norm(data.strengths || []),
      weaknesses: norm(data.weaknesses || []),
    };
  }
  if (facts.isReady) {
    return {
      strengths: facts.themesPos.map(t => t.label).filter(Boolean),
      weaknesses: facts.themesNeg.map(t => t.label).filter(Boolean),
    };
  }
  return { strengths: [], weaknesses: [] };
};

// Helper：從 chat.context 推 platform / ytRole（拿來打 feature endpoints）
const useFeatureContext = () => {
  const ix = useIX();
  const platform = ix?.state?.mode?.currentPlatform || "google";
  const ytRole = ix?.state?.mode?.ytRoleSelection || null;
  return { platform, ytRole, dispatch: ix?.dispatch };
};

// ---- RepliesTool ----
// 主題清單一律從真分析的 facts.themesNeg 來；沒分析就空態。
// cache key 加 namespace（analyzeRequestId + platform + ytRole + label）——
// 重新分析（新 requestId）後舊 cache 自然失效，不會把舊店家回覆套到新主題。
const RepliesTool = () => {
  const ix = useIX();
  const { platform, ytRole, dispatch } = useFeatureContext();
  const facts = useAnalyzeFactsVM();
  const themes = (facts.themesNeg || []).map(t => t.label).filter(Boolean);
  const cacheNs = `${facts.analyzeRequestId || "none"}|${platform}|${ytRole || ""}`;
  const [sel, setSel] = React.useState(themes[0] || null);
  const [cache, setCache] = React.useState({}); // {`${ns}::${topic}`: replyText}
  const pendingTopicRef = React.useRef(null);
  const lastReqRef = React.useRef(null);
  const replySlice = ix?.state?.features?.reply;

  // analyze 換了 → 重置 cache + 預設主題
  React.useEffect(() => {
    setCache({});
    setSel(themes[0] || null);
    pendingTopicRef.current = null;
    lastReqRef.current = null;
  }, [cacheNs]);

  // sel 為 null 但 themes 出來了 → 預設選第一個
  React.useEffect(() => {
    if (!sel && themes.length) setSel(themes[0]);
  }, [themes.length]);

  // 訂閱 reply slice，新的 ready 結果寫進 cache[ns::pendingTopic]
  React.useEffect(() => {
    if (replySlice?.status !== "ready" || !replySlice.data) return;
    if (replySlice.requestId === lastReqRef.current) return;
    lastReqRef.current = replySlice.requestId;
    const text = replySlice.data?.reply || replySlice.data?.draft || replySlice.data?.text
      || (typeof replySlice.data === "string" ? replySlice.data : null);
    const topic = pendingTopicRef.current || sel;
    if (text && topic) {
      const k = `${cacheNs}::${topic}`;
      setCache(c => ({ ...c, [k]: text }));
    }
  }, [replySlice?.status, replySlice?.requestId]);

  // 切換主題時自動 fetch（若沒 cache）
  React.useEffect(() => {
    if (!Adapters || !dispatch || !sel) return;
    const k = `${cacheNs}::${sel}`;
    if (cache[k]) return;
    if (replySlice?.status === "loading" && pendingTopicRef.current === sel) return;
    pendingTopicRef.current = sel;
    Adapters.fetchReply({ topic: sel, platform, ytRole, dispatch }).catch(() => {});
  }, [sel, cacheNs]);

  // 空態：尚未分析
  if (!facts.isReady || themes.length === 0) {
    return (
      <div style={{
        border: "1px dashed var(--rule)", padding: "60px 32px", textAlign: "center",
        background: "var(--paper-2)"
      }}>
        <Stamp>尚未準備好</Stamp>
        <h3 className="serif" style={{ fontSize: 22, fontWeight: 500, margin: "12px 0 8px", letterSpacing: "-0.02em" }}>
          先回 Dashboard 完成分析，這裡才會有主題可以回覆。
        </h3>
        <p style={{ fontSize: 13, color: "var(--ink-3)", margin: 0, lineHeight: 1.6 }}>
          回覆草稿是針對「真實出現在你客戶評論裡的負面主題」生成，不是罐頭。
        </p>
      </div>
    );
  }

  const cacheKey = `${cacheNs}::${sel}`;
  const aiText = cache[cacheKey];
  const isLoading = replySlice?.status === "loading" && !aiText;
  const isFailed = replySlice?.status === "failed" && !aiText && pendingTopicRef.current === sel;

  return (
    <div style={{ display: "grid", gridTemplateColumns: "260px 1fr", gap: 0, border: "1px solid var(--rule)" }}
         className="tool-split">
      <aside style={{ borderRight: "1px solid var(--rule)", background: "var(--paper-2)", padding: "24px 0" }}>
        <div style={{ padding: "0 20px 12px" }}>
          <Stamp>負面主題</Stamp>
          <div className="mono" style={{ fontSize: 10, color: "var(--ink-3)", marginTop: 6 }}>{themes.length} 主題（來自真實評論）</div>
        </div>
        {themes.map(t => {
          const hasCache = !!cache[`${cacheNs}::${t}`];
          return (
            <button key={t} onClick={() => setSel(t)} style={{
              display: "flex", width: "100%", padding: "14px 20px", gap: 10,
              background: sel === t ? "var(--card)" : "transparent",
              border: "none", borderLeft: sel === t ? "2px solid var(--coral)" : "2px solid transparent",
              cursor: "pointer", textAlign: "left", fontFamily: "var(--sans)",
              borderTop: "1px solid var(--rule-2)"
            }}>
              <span style={{ fontSize: 14, fontWeight: sel === t ? 600 : 400, color: "var(--ink)" }}>{t}</span>
              {hasCache && <span style={{ marginLeft: "auto", width: 6, height: 6, background: "var(--pos)", borderRadius: "50%", alignSelf: "center" }}/>}
              <ChevronRight size={14} style={{ marginLeft: hasCache ? 4 : "auto", alignSelf: "center", color: "var(--ink-4)" }}/>
            </button>
          );
        })}
      </aside>

      <div style={{ padding: "28px 32px", background: "var(--card)" }}>
        <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 20, gap: 16, flexWrap: "wrap" }}>
          <div>
            <Stamp>{aiText ? "Reply draft · AI 生成" : (isLoading ? "Reply draft · 撰寫中" : "Reply draft")}</Stamp>
            <h3 className="serif" style={{ fontSize: 26, fontWeight: 500, margin: "8px 0 6px", letterSpacing: "-0.015em" }}>
              給抱怨「{sel}」的顧客
            </h3>
            <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
              <span className="mono" style={{ fontSize: 11, color: "var(--ink-3)" }}>建議 48hr 內回覆</span>
              {isLoading && <span className="mono" style={{ fontSize: 11, color: "var(--coral-2)" }}>AI 撰寫中…</span>}
              {isFailed && <span className="mono" style={{ fontSize: 11, color: "var(--coral-2)" }}>生成失敗，請點重試</span>}
            </div>
          </div>
          <div style={{ display: "flex", gap: 8 }}>
            <Btn tone="ghost" size="sm" onClick={() => {
              setCache(c => { const n = { ...c }; delete n[cacheKey]; return n; });
              if (Adapters && dispatch) {
                pendingTopicRef.current = sel;
                Adapters.fetchReply({ topic: sel, platform, ytRole, dispatch }).catch(() => {});
              }
            }}><Refresh size={13}/> {aiText ? "換一版" : "重試"}</Btn>
            {aiText && <CopyBtn text={aiText}/>}
          </div>
        </div>

        <div style={{
          background: "var(--paper-2)", border: "1px solid var(--rule)", padding: "24px 28px",
          position: "relative", minHeight: 180
        }}>
          <div style={{
            position: "absolute", top: -10, left: 24, background: "var(--paper-2)",
            padding: "0 8px", fontSize: 10, color: "var(--ink-3)", letterSpacing: "0.1em"
          }} className="mono">DRAFT · 可直接貼到{platform === "youtube" ? " YouTube 留言" : " Google 商家"}</div>
          {aiText ? (
            <pre style={{
              fontFamily: "var(--sans)", fontSize: 14, lineHeight: 1.7,
              whiteSpace: "pre-wrap", margin: 0, color: "var(--ink)"
            }}>{aiText}</pre>
          ) : (
            <div style={{ fontSize: 13, color: "var(--ink-3)", lineHeight: 1.7, fontStyle: "italic" }}>
              {isLoading ? "正在為這個主題撰寫回覆草稿…" :
               isFailed ? "上一次撰寫失敗，請點上方「重試」。" :
               "選擇左側主題後會自動生成。"}
            </div>
          )}
        </div>

        <div style={{ marginTop: 24, display: "grid", gridTemplateColumns: "1fr 1fr", gap: 16 }} className="hide-cols-sm">
          <GuideNote title="為什麼這樣寫" items={[
            "承認問題，不用「人手不足」當藉口",
            "給具體時間，讓顧客信",
            "下次來的補償，比現在的折價券更強"
          ]}/>
          <GuideNote title="要避開的寫法" items={[
            "「感謝您的寶貴意見」這類 AI 味開頭",
            "過多 emoji 與 markdown 符號（**、##）",
            "承諾做不到的事（例如「永不再發生」）"
          ]} neg/>
        </div>
      </div>
    </div>
  );
};

const MarketingTool = () => {
  const ix = useIX();
  const { platform, ytRole, dispatch } = useFeatureContext();
  const facts = useAnalyzeFactsVM();
  const { strengths } = useSwotSummary();
  const strengthsStr = (strengths || []).filter(Boolean).join("、");

    ? (slice.data?.marketing || slice.data?.copy || slice.data?.text || (typeof slice.data === "string" ? slice.data : null))
    : null;

  // P3.9-5R fix #3：context key 含 platform/ytRole，避免切平台後仍套舊 ready 資料。

  const ctxKey = `${facts.analyzeRequestId || "none"}|${platform}|${ytRole || ""}|${strengthsStr}`;

// components/advisor.jsx — AI 顧問（接 /api/chat）
// ============================================================
const formatTime = (ts) => {
  const d = ts ? new Date(ts) : new Date();
  return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`;
};

const Advisor = () => {
  const ix = useIX();
  const { platform, ytRole, dispatch } = useFeatureContext();
  const messages = ix?.state?.chat?.messages || [];
  const chatStatus = ix?.state?.chat?.status || "idle";
  const typing = chatStatus === "loading";
  const [input, setInput] = React.useState("");
  const endRef = React.useRef(null);

  React.useEffect(() => {
    endRef.current?.parentElement?.scrollTo?.({ top: 99999, behavior: "smooth" });
  }, [messages.length, typing]);

  const send = (textOverride) => {
    const text = (textOverride || input).trim();
    if (!text) return;
    if (!Adapters || !dispatch) return;
    setInput("");
    const context = "";
    Adapters.sendChat({ message: text, context, platform, ytRole, dispatch }).catch(() => {});
  };

  // 顯示用 list：直接用 reducer 的 chat.messages
  const displayMsgs = messages.length === 0
    ? [{ role: "ai", content: "我可以根據你剛才分析的內容，幫你回答經營／創作上的問題。試著問：「下週要做什麼最有效？」", createdAt: Date.now() }]
    : messages;

  return (
    <div style={{ maxWidth: 1280, margin: "0 auto", padding: "40px 32px 0", minHeight: "calc(100vh - 64px)", display: "flex", flexDirection: "column" }}>
      <div style={{ marginBottom: 24 }}>
        <Stamp tone="coral">§ AI Advisor · beta</Stamp>
        <h1 className="serif" style={{ fontSize: "clamp(32px, 4vw, 48px)", fontWeight: 500, margin: "10px 0 6px", letterSpacing: "-0.025em" }}>
          問它關於你{platform === "youtube" ? "頻道" : "店"}的事，它讀過你所有的{platform === "youtube" ? "留言" : "評論"}。
        </h1>
        <p style={{ fontSize: 14, color: "var(--ink-3)", margin: 0, maxWidth: 640, lineHeight: 1.55 }}>
          不是通用 ChatGPT——這個顧問只看你的資料，也只給你可以今天就執行的答案。
        </p>
      </div>

      <div style={{ display: "grid", gridTemplateColumns: "1fr 280px", gap: 24, flex: 1, minHeight: 0 }}
           className="advisor-grid">
        <div style={{ display: "flex", flexDirection: "column", border: "1px solid var(--rule)", background: "var(--card)", minHeight: 560 }}>
          <div style={{ flex: 1, overflowY: "auto", padding: "24px 28px" }} className="chat-scroll">
            {displayMsgs.map((m, i) => <Msg key={i} m={m}/>)}
            {typing && <Typing/>}
            <div ref={endRef}/>
          </div>
          <div style={{ borderTop: "1px solid var(--rule)", padding: "16px 20px", background: "var(--paper-2)" }}>
            <div style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
              <textarea
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => {
                  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
                }}
                rows={1}
                placeholder={platform === "youtube" ? "例如：怎麼讓觀眾留言更踴躍？" : "例如：週末出餐慢要怎麼解？"}
                style={{
                  flex: 1, background: "var(--card)", border: "1px solid var(--rule)",
                  padding: "12px 14px", fontSize: 14, resize: "none",
                  fontFamily: "var(--sans)", color: "var(--ink)", outline: "none",
                  minHeight: 44, maxHeight: 160
                }}
              />
              <Btn tone="ink" onClick={() => send()} disabled={!input.trim() || typing}>
                <Send size={14}/> 送出
              </Btn>
            </div>
          </div>
        </div>

        <aside style={{ minWidth: 0 }}>
          <div style={{ border: "1px solid var(--rule)", background: "var(--paper-2)", padding: "20px 20px" }}>
            <Stamp>建議提問</Stamp>
            <div style={{ marginTop: 12 }}>
              {ADVISOR_SUGGESTIONS.map((s, i) => (
                <button key={i} onClick={() => send(s)} style={{
                  display: "block", width: "100%", textAlign: "left",
                  padding: "12px 14px", background: "var(--card)", border: "1px solid var(--rule)",
                  marginBottom: 8, cursor: "pointer", fontFamily: "var(--sans)",
                  fontSize: 13, color: "var(--ink)", lineHeight: 1.4,
                  transition: "background .15s"
                }}
                onMouseEnter={e => e.currentTarget.style.background = "var(--paper-3)"}
                onMouseLeave={e => e.currentTarget.style.background = "var(--card)"}
                >
                  <ArrowRight size={12} style={{ color: "var(--coral-2)", marginRight: 8, verticalAlign: "middle" }}/>
                  {s}
                </button>
              ))}
            </div>
          </div>
          <div style={{ border: "1px solid var(--rule)", background: "var(--ink)", color: "var(--paper)", padding: "20px", marginTop: 16 }}>
            <Stamp tone="coral">Context window</Stamp>
            <ul style={{ margin: "12px 0 0", padding: 0, listStyle: "none", fontSize: 12, lineHeight: 1.7 }}>
              <li style={{ opacity: 0.85 }}>✓ 已分析的{platform === "youtube" ? "影片留言" : "店家評論"}全文</li>
              <li style={{ opacity: 0.85 }}>✓ 正/負主題分布</li>
              <li style={{ opacity: 0.85 }}>✓ SWOT 與重點主題</li>
              <li style={{ opacity: 0.5 }}>✗ 內部 POS / 財務資料</li>
            </ul>
          </div>
        </aside>
      </div>
    </div>
  );
};

const Msg = ({ m }) => {
  const role = m.role === "user" ? "user" : "ai";
  const text = m.content || m.text || "";
  const time = formatTime(m.createdAt);
  if (role === "user") {
    return (
      <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 18 }}>
        <div style={{ maxWidth: "75%" }}>
          <div style={{
            background: "var(--ink)", color: "var(--paper)", padding: "12px 16px",
            fontSize: 14, lineHeight: 1.6, whiteSpace: "pre-wrap"
          }}>{text}</div>
          <div className="mono" style={{ fontSize: 10, color: "var(--ink-3)", marginTop: 4, textAlign: "right" }}>{time}</div>
        </div>
      </div>
    );
  }
  return (
    <div style={{ display: "flex", gap: 12, marginBottom: 22 }}>
      <div style={{
        width: 32, height: 32, background: "var(--forest)", color: "var(--paper)",
        display: "grid", placeItems: "center", flexShrink: 0,
        fontFamily: "var(--serif)", fontWeight: 600, fontSize: 14
      }}>i</div>
      <div style={{ flex: 1 }}>
        <div style={{
          background: "var(--paper-2)", border: "1px solid var(--rule)",
          padding: "14px 18px", fontSize: 14, lineHeight: 1.7, whiteSpace: "pre-wrap",
          color: "var(--ink)"
        }}>{text}</div>
        <div className="mono" style={{ fontSize: 10, color: "var(--ink-3)", marginTop: 4 }}>
          InsightX · {time}
        </div>
      </div>
    </div>
  );
};

const Typing = () => (
  <div style={{ display: "flex", gap: 12, marginBottom: 22 }}>
    <div style={{ width: 32, height: 32, background: "var(--forest)", color: "var(--paper)",
      display: "grid", placeItems: "center", flexShrink: 0,
      fontFamily: "var(--serif)", fontWeight: 600, fontSize: 14 }}>i</div>
    <div style={{
      background: "var(--paper-2)", border: "1px solid var(--rule)",
      padding: "14px 18px", display: "inline-flex", gap: 4
    }}>
      {[0,1,2].map(i => (
        <div key={i} style={{
          width: 6, height: 6, background: "var(--ink-3)", borderRadius: "50%",
          animation: `dot 1.2s ease-in-out ${i * 0.15}s infinite`
        }}/>
      ))}
    </div>
  </div>
);

// ============================================================
// components/topnav.jsx — 內頁頂部導覽
// ============================================================
const TopNav = ({ view, setView, onBack, showBadge, vm }) => {
  const items = [
    { k: "dashboard", l: "報告", ic: ChartBar },
    { k: "toolkit", l: "工具箱", ic: Tools },
    { k: "advisor", l: "AI 顧問", ic: Sparkle, badge: showBadge }
  ];
  return (
    <header style={{
      position: "sticky", top: 0, background: "var(--paper)", zIndex: 50,
      borderBottom: "1px solid var(--ink)"
    }}>
      <div style={{ maxWidth: 1280, margin: "0 auto", padding: "12px 32px",
        display: "flex", alignItems: "center", justifyContent: "space-between", gap: 16 }}>
        <div style={{ display: "flex", alignItems: "center", gap: 20 }}>
          <button onClick={onBack} style={{ border: "none", background: "transparent", cursor: "pointer", padding: 0, display: "flex", alignItems: "center", gap: 10 }}>
            <Logo size={24}/>
          </button>
          <div style={{ width: 1, height: 20, background: "var(--rule)" }} className="hide-sm"/>
          <div className="hide-sm" style={{ display: "flex", alignItems: "center", gap: 10 }}>
            <div style={{ fontSize: 13, fontWeight: 500 }}>{vm?.nameZh || vm?.name || "InsightX"}</div>
            {vm?.rating != null && (
              // P3.14：YouTube 模式 vm.rating = like_count（如 7380），加 ★ 會誤導成「7380 顆星」。
              vm?.platform === "youtube"
                ? <Pill tone="paper">{formatRatingCount(Number(vm.rating) || 0)} 讚</Pill>
                : <Pill tone="paper">{vm.rating} ★</Pill>
            )}
          </div>
        </div>

        <nav className="hide-sm" style={{ display: "flex", alignItems: "center", gap: 4 }}>
          {items.map(it => {
            const Ic2 = it.ic;
            const active = view === it.k;
            return (
              <button key={it.k} onClick={() => setView(it.k)} style={{
                padding: "10px 16px", fontSize: 13, fontWeight: 500,
                background: active ? "var(--ink)" : "transparent",
                color: active ? "var(--paper)" : "var(--ink-2)",
                border: "none", cursor: "pointer", fontFamily: "var(--sans)",
                display: "inline-flex", alignItems: "center", gap: 8, position: "relative"
              }}>
                <Ic2 size={14}/>{it.l}
                {it.badge && !active && (
                  <span style={{
                    width: 6, height: 6, background: "var(--coral)", borderRadius: "50%",
                    position: "absolute", top: 6, right: 8
                  }}/>
                )}
              </button>
            );
          })}
        </nav>

        <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
          <Btn tone="ghost" size="sm" className="hide-sm"><Download size={12}/> 下載報告</Btn>
        </div>
      </div>

      <div className="show-sm mobile-nav" style={{ display: "none", borderTop: "1px solid var(--rule)" }}>
        <div style={{ display: "flex" }}>
          {items.map(it => {
            const Ic2 = it.ic;
            const active = view === it.k;
            return (
              <button key={it.k} onClick={() => setView(it.k)} style={{
                flex: 1, padding: "10px 0", fontSize: 11,
                background: active ? "var(--ink)" : "transparent",
                color: active ? "var(--paper)" : "var(--ink-3)",
                border: "none", cursor: "pointer", fontFamily: "var(--sans)",
                display: "flex", flexDirection: "column", alignItems: "center", gap: 4
              }}>
                <Ic2 size={14}/>{it.l}
              </button>
            );
          })}
        </div>
      </div>
    </header>
  );
};

// ============================================================
// components/app.jsx — 路由 + Provider
// ============================================================
const App = () => {
  // 連 reducer
  const reducer = useAppReducer ? useAppReducer() : null;
  const ixCtx = React.useMemo(() => {
    if (!reducer) return null;
    return {
      state: reducer.state,
      dispatch: reducer.dispatch,
      lib: { Adapters, Async },
    };
  }, [reducer?.state, reducer?.dispatch]);

  const [view, setView] = React.useState(() => {
    try { return localStorage.getItem("ix_view") || "landing"; } catch { return "landing"; }
  });
  const [tweaksOpen, setTweaksOpen] = React.useState(false);
  const [tweaks, setTweaks] = React.useState({ accent: "coral", density: "comfortable", showAdvisorBadge: true });

  React.useEffect(() => {
    try { localStorage.setItem("ix_view", view); } catch {}
    window.scrollTo?.({ top: 0, behavior: "instant" });
  }, [view]);

  // Edit mode protocol（保留接口，但不嘗試 postMessage 出去）
  React.useEffect(() => {
    const listener = (e) => {
      const d = e.data || {};
      if (d.type === "__activate_edit_mode") setTweaksOpen(true);
      if (d.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", listener);
    return () => window.removeEventListener("message", listener);
  }, []);

  // accent css var
  React.useEffect(() => {
    const map = { coral: "var(--coral)", forest: "var(--forest)", ochre: "var(--ochre)", slate: "var(--slate)" };
    const map2 = { coral: "var(--coral-2)", forest: "var(--forest-ink)", ochre: "oklch(0.62 0.13 85)", slate: "oklch(0.45 0.06 240)" };
    document.documentElement.style.setProperty("--accent", map[tweaks.accent] || map.coral);
    document.documentElement.style.setProperty("--accent-2", map2[tweaks.accent] || map2.coral);
  }, [tweaks.accent]);

  // 分析完成後自動切到 dashboard
  const phase = ixCtx?.state?.stream?.phase;
  React.useEffect(() => {
    if (phase === "succeeded" && view === "landing") {
      const t = setTimeout(() => setView("dashboard"), 600);
      return () => clearTimeout(t);
    }
  }, [phase]);

  const goLanding = () => setView("landing");
  const goDashboard = () => setView("dashboard");

  // 給 TopNav 用的 vm
  const vm = React.useMemo(() => {
    const raw = ixCtx?.state?.features?.analyze?.data;
    if (!raw) return null;
    return buildShopViewModel(raw);
  }, [ixCtx?.state?.features?.analyze?.data]);

  const inner = view === "landing" ? (
    <>
      <LandingPage onComplete={goDashboard}/>
      <TweaksPanel active={tweaksOpen} setActive={setTweaksOpen} state={tweaks} setState={setTweaks}/>
    </>
  ) : (
    <div style={{ background: "var(--paper)", minHeight: "100vh" }}>
      <TopNav view={view} setView={setView} onBack={goLanding} showBadge={tweaks.showAdvisorBadge} vm={vm}/>
      <main>
        {view === "dashboard" && <Dashboard/>}
        {view === "toolkit" && <Toolkit/>}
        {view === "advisor" && <Advisor/>}
      </main>
      <TweaksPanel active={tweaksOpen} setActive={setTweaksOpen} state={tweaks} setState={setTweaks}/>
    </div>
  );

  return (
    <IXContext.Provider value={ixCtx}>{inner}</IXContext.Provider>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
